<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#00d4aa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background + glow -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle grid overlay -->
  <g opacity="0.06" stroke="#00d4aa" stroke-width="1">
    <path d="M0 0 H1200 M0 60 H1200 M0 120 H1200 M0 180 H1200 M0 240 H1200 M0 300 H1200 M0 360 H1200 M0 420 H1200 M0 480 H1200 M0 540 H1200 M0 600 H1200"/>
    <path d="M0 0 V630 M60 0 V630 M120 0 V630 M180 0 V630 M240 0 V630 M300 0 V630 M360 0 V630 M420 0 V630 M480 0 V630 M540 0 V630 M600 0 V630 M660 0 V630 M720 0 V630 M780 0 V630 M840 0 V630 M900 0 V630 M960 0 V630 M1020 0 V630 M1080 0 V630 M1140 0 V630"/>
  </g>

  <!-- logo hexagon -->
  <g transform="translate(100, 90)">
    <rect width="64" height="64" rx="14" fill="#00d4aa"/>
    <g transform="translate(13, 13)" fill="none" stroke="#000" stroke-width="3" stroke-linejoin="round">
      <path d="M19 2 L36 11 V28 L19 36 L2 28 V11 Z" />
      <path d="M19 11 L27 15 V23 L19 28 L11 23 V15 Z" fill="#000"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="180" y="135" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#f0f0f0">
    PointBreak<tspan fill="#00d4aa">Lab</tspan>
  </text>

  <!-- main heading -->
  <text x="100" y="320" font-family="Inter, system-ui, sans-serif" font-size="84" font-weight="900" fill="#f0f0f0" letter-spacing="-2">
    Privacy-First
  </text>
  <text x="100" y="410" font-family="Inter, system-ui, sans-serif" font-size="84" font-weight="900" fill="#00d4aa" letter-spacing="-2">
    Applications
  </text>

  <!-- tagline -->
  <text x="100" y="475" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#888">
    For a world that is watching.
  </text>

  <!-- footer -->
  <g transform="translate(100, 560)">
    <text font-family="JetBrains Mono, monospace" font-size="18" fill="#666">
      <tspan fill="#00d4aa">●</tspan>
      <tspan dx="10">No servers</tspan>
      <tspan dx="20" fill="#444">·</tspan>
      <tspan dx="20">No tracking</tspan>
      <tspan dx="20" fill="#444">·</tspan>
      <tspan dx="20">No compromise</tspan>
    </text>
  </g>

  <text x="1100" y="595" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="16" fill="#444">
    pointbreaklab.com
  </text>
</svg>
